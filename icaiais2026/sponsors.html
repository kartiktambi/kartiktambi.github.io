<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sponsors Coming Soon</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --accent:#3b1d82;
      --light:#f5f1ff;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#f5f7fb;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow:hidden;
      position:relative;
    }

    /* Background Glow */

    .bg-circle{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:0.25;
      z-index:0;
    }

    .circle-1{
      width:220px;
      height:220px;
      background:#7c5cff;
      top:-40px;
      left:-60px;
    }

    .circle-2{
      width:240px;
      height:240px;
      background:#3b1d82;
      bottom:-80px;
      right:-60px;
    }

    /* Card */

    .coming-card{
      position:relative;
      z-index:2;
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:28px;
      padding:42px 28px;
      text-align:center;
      box-shadow:0 14px 40px rgba(0,0,0,0.08);
    }

    /* Icon */

    .icon-wrap{
      width:90px;
      height:90px;
      margin:auto;
      border-radius:50%;
      background:var(--light);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:24px;
    }

    .icon{
      font-size:2.5rem;
      color:var(--accent);
    }

    /* Text */

    h1{
      font-size:2rem;
      color:#111827;
      margin-bottom:14px;
      line-height:1.3;
    }

    p{
      color:#666;
      font-size:1rem;
      line-height:1.8;
      margin-bottom:28px;
    }

    /* Button */

    .notify-btn{
      display:inline-block;
      background:var(--accent);
      color:#fff;
      text-decoration:none;
      padding:14px 26px;
      border-radius:14px;
      font-size:0.96rem;
      font-weight:600;
      transition:0.3s ease;
    }

    .notify-btn:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    /* Mobile */

    @media(max-width:480px){

      .coming-card{
        padding:36px 22px;
      }

      h1{
        font-size:1.7rem;
      }

      p{
        font-size:0.95rem;
      }

      .icon-wrap{
        width:80px;
        height:80px;
      }

      .icon{
        font-size:2.2rem;
      }

    }

  </style>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

  <!-- Background -->

  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <!-- Main Card -->

  <div class="coming-card">

    <div class="icon-wrap">
      <i class="fas fa-handshake icon"></i>
    </div>

    <h1>Sponsors<br>Coming Soon</h1>


  </div>

</body>
</html>
